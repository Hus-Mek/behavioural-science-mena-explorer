name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Lint with py_compile
        run: |
          python -m py_compile server.py
          python -m py_compile scraper.py

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short
        env:
          OPENROUTER_API_KEY: ""

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t bs-mena-explorer .

      - name: Test Docker image starts
        run: |
          docker run -d --name test-explorer -p 3000:3000 -e OPENROUTER_API_KEY=test bs-mena-explorer
          sleep 5
          docker logs test-explorer
          docker stop test-explorer
          docker rm test-explorer
